<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Advanced Persistent Access Strategies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700&display=swap" rel="stylesheet">
  <style>
    /* Custom scrollbar for webkit browsers (Chrome, Safari) */
    ::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #1e293b; /* slate-800 */
    }
    ::-webkit-scrollbar-thumb {
      background: #475569; /* slate-600 */
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #64748b; /* slate-500 */
    }

    .chrome-text {
      font-family: 'Orbitron', sans-serif;
      background: linear-gradient(145deg, #f0f0f5, #b0b0c0, #f0f0f5); /* Metallic gradient */
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent; /* Fallback for browsers not supporting background-clip */
      -webkit-text-fill-color: transparent; /* For Webkit browsers */
      text-shadow:
        -1px -1px 1px rgba(255, 255, 255, 0.7), /* Top-left highlight */
        1px 1px 1px rgba(0, 0, 0, 0.2),       /* Bottom-right shadow for depth */
        0 0 3px rgba(220, 220, 255, 0.6),   /* Inner bevel/soft light */
        0 0 8px rgba(180, 210, 255, 0.3),   /* Subtle outer glow */
        0 0 15px rgba(180, 210, 255, 0.2); /* Fainter outer glow */
      letter-spacing: 0.075em;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .metallic-title-main {
      font-family: 'Cinzel Decorative', serif;
      font-weight: 700; /* Bold */
      color: #bac8da; /* Fallback color: a mid-tone metallic blue-grey */
      line-height: 1.2; /* Adjusted for better stacking of multiline text */

      /* Base metallic gradient for the text face */
      background: linear-gradient(
        145deg,
        #f0f8ff 15%, /* AliceBlue - very light top highlight */
        #d0d8e8 40%, /* LightSteelBlue/Silver mix - main face */
        #a0aec0 65%, /* SlateGray/Steel - darker part of face */
        #c0c8d8 85%  /* Lighter sheen towards bottom */
      );
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;

      /* Layered text shadows for 3D embossed effect */
      text-shadow:
        /* --- Inner Bevel Illusion & Highlights --- */
        /* Top-left bright highlight (simulates light source from top-left) */
        -1px -1px 0 rgba(255, 255, 255, 0.6), /* Sharp white */
        -2px -2px 1px rgba(230, 240, 255, 0.4), /* Softer, slightly larger light blue/white highlight */

        /* --- Depth & Darker Edges --- */
        /* Bottom-right dark shadow for primary depth */
        1px 1px 0 rgba(50, 60, 80, 0.3),  /* Darker sharp edge */
        2px 2px 0 rgba(40, 50, 70, 0.25),
        3px 3px 1px rgba(30, 40, 60, 0.4),  /* Main dark shadow for pop */
        4px 4px 2px rgba(0, 0, 0, 0.25),     /* Fainter, broader shadow for overall depth */

        /* A faint general glow to lift it from the background */
        0 0 10px rgba(175, 200, 225, 0.15), /* Soft, subtle light blue aura */
        0 0 20px rgba(175, 200, 225, 0.1);

      letter-spacing: 0.03em; /* Fine-tune spacing */
    }
  </style>
<link rel="stylesheet" href="/index.css">
</head>
<body class="bg-slate-900">
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
